<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SmartIntern AI</title>
</head>
<body>
    <script>
        (function () {
            var token = localStorage.getItem('jwt_token');
            if (!token) {
                window.location.href = '/pages/login.html';
                return;
            }

            try {
                var base64Url = token.split('.')[1];
                var base64 = base64Url.replace(/-/g, '+').replace(/_/g, '/');
                var payload = JSON.parse(decodeURIComponent(atob(base64).split('').map(function (c) {
                    return '%' + ('00' + c.charCodeAt(0).toString(16)).slice(-2);
                }).join('')));

                if (payload.exp && payload.exp * 1000 < Date.now()) {
                    localStorage.removeItem('jwt_token');
                    localStorage.removeItem('user_role');
                    window.location.href = '/pages/login.html';
                    return;
                }

                var dashboards = {
                    'ADMIN': '/pages/dashboard-admin.html',
                    'ETUDIANT': '/pages/dashboard-etudiant.html',
                    'ENTREPRISE': '/pages/dashboard-entreprise.html',
                    'ENCADRANT_ACADEMIQUE': '/pages/dashboard-encadrant.html',
                    'ENCADRANT_ENTREPRISE': '/pages/dashboard-encadrant-entreprise.html'
                };

                var role = payload.role || localStorage.getItem('user_role');
                window.location.href = dashboards[role] || '/pages/login.html';
            } catch (e) {
                localStorage.removeItem('jwt_token');
                localStorage.removeItem('user_role');
                window.location.href = '/pages/login.html';
            }
        })();
    </script>
</body>
</html>
