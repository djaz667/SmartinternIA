<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Réinitialisation mot de passe - SmartIntern AI</title>
    <link rel="stylesheet" href="/css/style.css">
</head>
<body>
    <div class="auth-container">
        <div class="auth-card">
            <h1>Mot de passe oublié</h1>
            <p class="subtitle">Réinitialisez votre mot de passe</p>

            <div id="message" class="message hidden"></div>

            <!-- Étape 1 : Saisie email -->
            <div id="step1">
                <form id="requestForm" novalidate>
                    <div class="form-group">
                        <label for="email">Votre email</label>
                        <input type="email" id="email" name="email" required placeholder="votre@email.com">
                        <span class="error-text" id="emailError"></span>
                    </div>
                    <button type="submit" class="btn btn-primary">Envoyer le lien</button>
                </form>
            </div>

            <!-- Étape 2 : Nouveau mot de passe -->
            <div id="step2" class="hidden">
                <form id="confirmForm" novalidate>
                    <div class="form-group">
                        <label for="nouveauMotDePasse">Nouveau mot de passe</label>
                        <input type="password" id="nouveauMotDePasse" name="nouveauMotDePasse"
                               required minlength="8" placeholder="Minimum 8 caractères">
                        <span class="error-text" id="nouveauMotDePasseError"></span>
                    </div>
                    <div class="form-group">
                        <label for="confirmMotDePasse">Confirmer le mot de passe</label>
                        <input type="password" id="confirmMotDePasse" name="confirmMotDePasse"
                               required placeholder="Retapez le mot de passe">
                        <span class="error-text" id="confirmMotDePasseError"></span>
                    </div>
                    <button type="submit" class="btn btn-primary">Réinitialiser</button>
                </form>
            </div>

            <p class="auth-link">
                <a href="/pages/login.html">Retour à la connexion</a>
            </p>
        </div>
    </div>

    <script src="/js/api.js"></script>
    <script src="/js/reset-password.js"></script>
</body>
</html>
